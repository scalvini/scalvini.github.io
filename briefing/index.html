  border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s;
}
.input-group button:hover { opacity: 0.8; }
.error { color: #d00; font-size: 13px; height: 20px; margin-top: 4px; }
#briefing-content { display: none; }
</style>

function unlock() {
  var pwd = document.getElementById("pwd").value;
  if (!pwd) return;
  try {
    var decrypted = CryptoJS.AES.decrypt(encData, pwd);
    var pt = decrypted.toString(CryptoJS.enc.Utf8);
    if (!pt || pt.length < 10) throw new Error("bad");
    document.getElementById("lock-screen").style.display = "none";
    var c = document.getElementById("briefing-content");
    c.style.display = "block";
    var doc = new DOMParser().parseFromString(pt, "text/html");
    var styles = doc.querySelectorAll("style, link[rel=stylesheet]");
    for (var i = 0; i < styles.length; i++) {
      document.head.appendChild(styles[i].cloneNode(true));
    }
    c.innerHTML = doc.body.innerHTML;
    document.title = doc.title || "Briefing";
    sessionStorage.setItem("briefing_pwd", pwd);
  } catch(e) {
    document.getElementById("err").textContent = "Wrong password. Try again.";
    document.getElementById("pwd").value = "";
    document.getElementById("pwd").focus();
  }
}
(function() {
  var saved = sessionStorage.getItem("briefing_pwd");
  if (saved) { document.getElementById("pwd").value = saved; unlock(); }
  document.getElementById("pwd").addEventListener("keydown", function(e) {
    if (e.key === "Enter") unlock();
  });
})();
</script>
